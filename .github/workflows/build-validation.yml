name: Build Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      blazor: ${{ steps.filter.outputs.blazor }}
      webapi: ${{ steps.filter.outputs.webapi }}
      nuget: ${{ steps.filter.outputs.nuget }}
      visualstudio: ${{ steps.filter.outputs.visualstudio }}
      container: ${{ steps.filter.outputs.container }}
      ai-ml: ${{ steps.filter.outputs.ai-ml }}
      iot: ${{ steps.filter.outputs.iot }}
      blazor-hybrid: ${{ steps.filter.outputs.blazor-hybrid }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          dotnet:
            - '.NET/**'
          blazor:
            - 'Frontend Web with Blazor/**'
          webapi:
            - 'Backend Web with Web APIs/**'
          nuget:
            - 'Package Management with NuGet/**'
          visualstudio:
            - 'Visual Studio/**'
          container:
            - 'Containers/**'
          ai-ml:
            - 'Artificial Intelligence and Machine Learning/**'
          iot:
            - 'IoT/**'
          blazor-hybrid:
            - 'Blazor Hybrid/**'

  build-dotnet-samples:
    name: Build .NET Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.dotnet == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Restore .NET Dependencies
      run: |
        find . -name '*.sln' -path './.NET/*' | while read sln; do
          if [ -f "$sln" ]; then
            echo "Restoring: $sln"
            dotnet restore "$sln" || echo "Restore failed for $sln, continuing..."
          fi
        done
      continue-on-error: true
    
    - name: Build .NET Projects
      run: |
        find . -name '*.csproj' -path './.NET/*' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release --no-restore || echo "Build failed for $csproj, continuing..."
          fi
        done
      continue-on-error: false

  build-blazor-samples:
    name: Build Blazor Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.blazor == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Restore Blazor Dependencies
      run: |
        find "Frontend Web with Blazor" -name '*.sln' | while read sln; do
          if [ -f "$sln" ]; then
            echo "Restoring: $sln"
            dotnet restore "$sln" || echo "Restore warning for $sln"
          fi
        done
      continue-on-error: true
    
    - name: Build Blazor Projects
      run: |
        find "Frontend Web with Blazor" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release --no-restore || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-webapi-samples:
    name: Build Web API Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.webapi == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Build Web API Projects
      run: |
        find "Backend Web with Web APIs" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-nuget-samples:
    name: Build NuGet Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.nuget == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Build NuGet Package Samples
      run: |
        find "Package Management with NuGet" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-visualstudio-samples:
    name: Build Visual Studio Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.visualstudio == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Build Visual Studio Samples
      run: |
        find "Visual Studio" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-container-samples:
    name: Build Container Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.container == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Build Container Samples
      run: |
        find "Containers" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-ai-ml-samples:
    name: Build AI/ML Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ai-ml == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true

    - name: Build AI/ML Projects
      run: |
        find "Artificial Intelligence and Machine Learning" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-iot-samples:
    name: Build IoT Samples
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.iot == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
    
    - name: Build IoT Projects
      run: |
        find "IoT" -name '*.csproj' | while read csproj; do
          if [ -f "$csproj" ]; then
            echo "Building: $csproj"
            dotnet build "$csproj" --configuration Release || echo "Build info: $csproj"
          fi
        done
      continue-on-error: false

  build-blazor-hybrid-samples:
    name: Build Blazor Hybrid Samples
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.blazor-hybrid == 'true' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
        
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui
      continue-on-error: true

    - name: Build Blazor Hybrid Projects
      run: |
        Get-ChildItem -Path "Blazor Hybrid" -Recurse -Include "*.csproj" | ForEach-Object {
          Write-Host "Building: $_"
          dotnet build $_ --configuration Release --no-restore
        }
      continue-on-error: false

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, build-dotnet-samples, build-blazor-samples, build-webapi-samples, build-nuget-samples, build-visualstudio-samples, build-container-samples, build-ai-ml-samples, build-iot-samples, build-blazor-hybrid-samples]
    
    steps:
    - name: Print Build Summary
      run: |
        echo "## Build Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| .NET Samples | ${{ needs.build-dotnet-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Blazor Samples | ${{ needs.build-blazor-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Web API Samples | ${{ needs.build-webapi-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| NuGet Samples | ${{ needs.build-nuget-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Visual Studio Samples | ${{ needs.build-visualstudio-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Container Samples | ${{ needs.build-container-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| AI/ML Samples | ${{ needs.build-ai-ml-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| IoT Samples | ${{ needs.build-iot-samples.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Blazor Hybrid Samples | ${{ needs.build-blazor-hybrid-samples.result }} |" >> $GITHUB_STEP_SUMMARY
